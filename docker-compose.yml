services:
  twitch-drops-miner:
    image: ghcr.io/loginrs99/tdm:latest
    pull_policy: always
    container_name: twitch-drops-miner
    restart: unless-stopped
    init: true
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_SUMMARY_INTERVAL=${DISCORD_SUMMARY_INTERVAL:-240}
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
    
    volumes:
      # These two files must exist on the host before first start.
      # Docker creates a directory when a bind-mounted file source is missing.
      - ./files/settings.json:/home/appuser/app/settings.json:ro
      # Login: export Twitch browser cookies in Netscape format to ./files/cookies.jar.
      # Keep this file private and out of git; replace it and restart if Twitch logs out.
      - ./files/cookies.jar:/home/appuser/app/cookies.jar
      - ./files/logs:/home/appuser/app/logs
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 50M

    sysctls:
      net.ipv4.tcp_keepalive_time: 60
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 5
      
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
